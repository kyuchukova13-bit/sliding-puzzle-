<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Логически Пъзел</title>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 15px;
            box-sizing: border-box;
        }

        /* --- Контроли и Статистика --- */
        .header-ui {
            background-color: #34495e;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 480px;
            text-align: center;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            font-size: 0.9rem;
            color: #bdc3c7;
        }

        .stat-val { color: #f1c40f; font-weight: bold; }

        h1 { margin: 0 0 10px 0; font-size: 1.4rem; }

        select, button {
            padding: 8px 12px;
            font-size: 0.9rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button {
            background: linear-gradient(135deg, #FF9F43, #FF7F00);
            color: white;
            font-weight: bold;
        }

        /* --- Контейнер на играта --- */
        #puzzle-container {
            display: grid;
            gap: 1.2vmin;
            background-color: #34495e;
            padding: 1.5vmin;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 82vmin; 
            height: 82vmin; 
            max-width: 460px; 
            max-height: 460px;
        }

        .tile {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7vmin;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
            box-shadow: inset 0 -3px 5px rgba(0,0,0,0.2), inset 0 3px 5px rgba(255,255,255,0.5);
            transition: transform 0.1s;
        }

        @media (min-width: 600px) { .tile { font-size: 40px; } }

        .tile:not(.empty):active { transform: scale(0.95); }

        .tile.empty {
            background-color: #2c3e50;
            box-shadow: inset 0 6px 10px rgba(0,0,0,0.4);
        }

        /* Цветови схеми */
        .grid-3 .tile:not(.empty) { background-color: #FF9F43; color: #333; }
        .grid-4 .tile:not(.empty) { background-color: #3498db; color: #fff; }
        .grid-5 .tile:not(.empty) { background-color: #4cd137; color: #fff; }

        /* --- Финален Екран (Overlay) --- */
        #win-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.95);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
        }

        #win-screen h2 { font-size: 3rem; color: #f1c40f; margin-bottom: 10px; }
        #win-screen p { font-size: 1.2rem; margin: 5px 0; }

        /* --- Авторски подпис --- */
        #author {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 0.75rem;
            color: #7f8c8d;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="header-ui">
        <h1>Пъзел</h1>
        <div style="display: flex; justify-content: center; gap: 10px; align-items: center;">
            <select id="grid-size" onchange="initGame()">
                <option value="3">Ниво: 3x3</option>
                <option value="4">Ниво: 4x4</option>
                <option value="5">Ниво: 5x5</option>
            </select>
            <button onclick="initGame()">Нова игра</button>
        </div>
        <div class="stats-bar">
            <span>Ходове: <span id="move-count" class="stat-val">0</span></span>
            <span>Най-добро: <span id="best-score" class="stat-val">-</span></span>
        </div>
    </div>

    <div id="puzzle-container"></div>

    <div id="win-screen">
        <h2>ПОБЕДА!</h2>
        <p id="final-moves"></p>
        <p id="record-msg" style="color: #4cd137; font-weight: bold;"></p>
        <br>
        <button onclick="closeWinScreen()" style="padding: 15px 30px; font-size: 1.2rem;">ИГРАЙ ПАК</button>
    </div>

    <div id="author">Дизайн: Дочка Кючукова</div>
